services:
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    restart: unless-stopped
    networks:
      - proxy
    ports:
      - "1025:1025"     # SMTP ins LAN/Host veröffentlichen
    expose:
      - "8025"          # WebUI bleibt intern für Traefik
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.mailhog.rule=Host(`${MAILHOG_HOST}`)
      - traefik.http.routers.mailhog.entrypoints=websecure
      - traefik.http.routers.mailhog.tls=true
      - traefik.http.routers.mailhog.tls.certresolver=stepca
      - traefik.http.routers.mailhog.middlewares=mailhog-auth
      - traefik.http.middlewares.mailhog-auth.basicauth.users=${MAILHOG_USER}:${MAILHOG_PASSWORD_HASH}
      - traefik.http.services.mailhog.loadbalancer.server.port=8025

networks:
  proxy:
    external: true