entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false

api:
  dashboard: true
  insecure: true

certificatesResolvers:
  stepca:
    acme:
      email: "${ACME_EMAIL}"
      storage: "/acme/acme.json"
      caServer: "${STEP_CA_ACME_URL}"
      tlsChallenge: {}

log:
  level: INFO
